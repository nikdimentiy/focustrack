<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#050810" />
  <title>FocusTrack</title>

  <!-- Favicon – browser tab icon -->
  <link rel="icon" type="image/png" sizes="32x32"  href="/icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16"  href="/icons/favicon-16x16.png" />
  <link rel="shortcut icon"                         href="/icons/favicon.ico" />

  <!-- Apple touch icon – iOS "Add to Home Screen" bookmark -->
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <!-- Android / PWA – Chrome "Add to Home Screen" bookmark -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="theme-dw">

  <div id="auth-widget"></div>
  <nav id="nav"></nav>

  <main>
    <div id="dw-view"></div>
    <div id="tr-view"></div>
  </main>

  <div id="toast-container"></div>

  <!-- Topic Modal -->
  <div id="topic-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="panel-corner tl"></div><div class="panel-corner tr"></div>
      <div class="panel-corner bl"></div><div class="panel-corner br"></div>
      <div class="modal-header">
        <h2 id="modal-title">Add Topic</h2>
        <button id="modal-close" class="modal-close" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <form id="topic-form" class="modal-form">
        <div class="form-group">
          <label class="form-label" for="topic-name">Topic Name</label>
          <input type="text" id="topic-name" class="form-input" placeholder="e.g. Binary Search Trees" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="topic-date">Date of Learning</label>
          <input type="date" id="topic-date" class="form-input" required />
        </div>
        <div class="form-group">
          <label class="form-label">Repetitions Completed</label>
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" id="chk-repeat1" class="modal-checkbox" />
              <span class="checkbox-custom"></span>
              Day 1
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="chk-repeat3" class="modal-checkbox" />
              <span class="checkbox-custom"></span>
              Day 3
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="chk-repeat7" class="modal-checkbox" />
              <span class="checkbox-custom"></span>
              Day 7
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="chk-repeat21" class="modal-checkbox" />
              <span class="checkbox-custom"></span>
              Day 21
            </label>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" id="modal-cancel" class="btn btn-secondary">Cancel</button>
          <button type="submit" id="modal-save" class="btn btn-primary">Save Topic</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
