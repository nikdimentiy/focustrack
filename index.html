<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#050810" />
  <title>FocusTrack</title>

  <!-- Favicon – browser tab icon -->
  <link rel="icon" type="image/png" sizes="32x32"  href="/icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16"  href="/icons/favicon-16x16.png" />
  <link rel="shortcut icon"                         href="/icons/favicon.ico" />

  <!-- Apple touch icon – iOS "Add to Home Screen" bookmark -->
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <!-- Android / PWA – Chrome "Add to Home Screen" bookmark -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="theme-dw">

  <div id="auth-widget"></div>
  <nav id="nav"></nav>

  <main>
    <div id="dw-view"></div>
    <div id="tr-view"></div>
    <div id="an-view"></div>
  </main>

  <div id="footer-widget"></div>
  <div id="info-btn"></div>
  <div id="toast-container"></div>

  <!-- Topic Modal -->
  <div id="topic-modal">
    <div class="modal-content">
      <div class="modal-corner tl"></div><div class="modal-corner tr"></div>
      <div class="modal-corner bl"></div><div class="modal-corner br"></div>
      <div class="modal-header">
        <div class="modal-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <h2 id="modal-title">Add New Topic</h2>
      </div>
      <form id="topic-form">
        <input type="hidden" id="row-index" value="-1" />
        <input type="hidden" id="status" value="Pending" />
        <div class="form-group">
          <label>Topic Name</label>
          <input type="text" id="topic" class="form-control" placeholder="e.g. Binary Search Trees" required />
        </div>
        <div class="form-group">
          <label>Date Learned</label>
          <input type="date" id="date-learned" class="form-control" required />
        </div>
        <div class="form-group">
          <label>Next Review</label>
          <input type="date" id="next-repeat" class="form-control" required />
        </div>
        <div class="form-group">
          <label>Tags <span style="opacity:.5;font-size:.9em">(optional, comma-separated)</span></label>
          <input type="text" id="topic-tags" class="form-control" placeholder="e.g. Algorithms, Math, Interview Prep" />
        </div>
        <div class="form-group">
          <label>Notes <span style="opacity:.5;font-size:.9em">(optional)</span></label>
          <textarea id="topic-notes" class="form-control" rows="3" placeholder="Key concepts, links, context..."></textarea>
        </div>
        <div class="modal-buttons">
          <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Topic</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Session Edit Modal -->
  <div id="session-edit-modal">
    <div class="modal-content">
      <div class="modal-corner tl"></div><div class="modal-corner tr"></div>
      <div class="modal-corner bl"></div><div class="modal-corner br"></div>
      <div class="modal-header">
        <div class="modal-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
          </svg>
        </div>
        <h2>Edit Session</h2>
      </div>
      <form id="session-edit-form">
        <input type="hidden" id="session-ts" />
        <div class="form-group">
          <label>Task</label>
          <input type="text" id="session-edit-task" class="form-control" required />
        </div>
        <div class="form-group">
          <label>Duration (minutes)</label>
          <input type="number" id="session-edit-minutes" class="form-control" min="1" max="1440" required />
        </div>
        <div class="form-group">
          <label>Intensity</label>
          <select id="session-edit-intensity" class="form-control">
            <option value="Low">🌿 Low</option>
            <option value="Focus">🔥 Focus</option>
            <option value="Ultra">⚡ Ultra</option>
          </select>
        </div>
        <div class="modal-buttons">
          <button type="button" id="session-cancel-btn" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
